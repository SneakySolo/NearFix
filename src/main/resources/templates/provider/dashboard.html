<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Provider Dashboard - NearFix</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; color: #333; }
        .page-container { max-width: 800px; margin: 40px auto; padding: 0 1rem; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .dashboard-header h2 { color: #1a1a2e; }
        .request-list { display: flex; flex-direction: column; gap: 1rem; }
        .request-card { background: white; border-radius: 10px; padding: 1.2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
        .request-title { font-weight: 600; font-size: 1rem; }
        .request-desc { color: #555; font-size: 0.9rem; margin: 0.4rem 0; }
        .request-date { font-size: 0.8rem; color: #aaa; }
        .btn-secondary { display: inline-block; margin-top: 0.8rem; padding: 0.45rem 1rem; background: #4f46e5; color: white; border-radius: 6px; text-decoration: none; font-size: 0.85rem; }
        .empty-state { text-align: center; color: #aaa; padding: 4rem 0; font-size: 0.95rem; }
        .warning-msg { background: #fef9c3; color: #854d0e; padding: 0.7rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem; }
        .logout-link { margin-top: 2rem; text-align: right; }
        .logout-link a { color: #4f46e5; font-size: 0.9rem; }
    </style>
</head>
<body>
<div th:replace="~{layout/navbar :: navbar}"></div>
<div class="page-container">
    <div class="dashboard-header">
        <h2>Nearby Repair Requests</h2>
    </div>

    <!-- Location not captured yet -->
    <div th:if="${noLocation}" class="warning-msg">
        📍 Your location is being captured. If requests don't show up, please refresh the page.
    </div>

    <div th:if="${#lists.isEmpty(requests) and !noLocation}" class="empty-state">
        No open requests within 12km of your location.
    </div>

    <div class="request-list">
        <div class="request-card" th:each="req : ${requests}">
            <div class="request-title" th:text="${req.title}"></div>
            <div class="request-desc" th:text="${req.description}"></div>
            <div class="request-date" th:text="${#temporals.format(req.createdAt, 'dd MMM yyyy, HH:mm')}"></div>
            <a class="btn-secondary" th:href="@{/provider/request/{id}(id=${req.id})}">View & Bid →</a>
        </div>
    </div>
</div>

<!-- Silently capture and send location -->
<script>
    navigator.geolocation.getCurrentPosition(function(pos) {
        fetch('/location/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'latitude=' + pos.coords.latitude + '&longitude=' + pos.coords.longitude
        });
    });
</script>

</body>
</html>
