<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Accepted Requests - NearFix</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; color: #333; }

        .page-container { max-width: 800px; margin: 40px auto; padding: 0 1rem; }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .page-header h2 { color: #1a1a2e; }

        .request-list { display: flex; flex-direction: column; gap: 1rem; }

        .request-card {
            background: white;
            border-radius: 10px;
            padding: 1.2rem 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .request-info { flex: 1; }
        .request-title { font-weight: 600; font-size: 1rem; margin-bottom: 0.3rem; }
        .request-desc { color: #555; font-size: 0.88rem; margin-bottom: 0.3rem; }
        .request-date { font-size: 0.78rem; color: #aaa; }

        .btn-chat {
            padding: 0.55rem 1.1rem;
            background: #059669;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.88rem;
            white-space: nowrap;
        }
        .btn-chat:hover { background: #047857; }

        .empty-state {
            text-align: center;
            color: #aaa;
            padding: 4rem 0;
            font-size: 0.95rem;
        }

        .nav-links { margin-top: 2rem; display: flex; justify-content: space-between; }
        .nav-links a { color: #4f46e5; font-size: 0.9rem; }
    </style>
</head>
<body>
<div th:replace="~{layout/navbar :: navbar}"></div>
<div class="page-container">

    <div class="page-header">
        <h2>Accepted Requests</h2>
    </div>

    <div th:if="${#lists.isEmpty(list)}" class="empty-state">
        You have no accepted requests yet.
    </div>

    <div class="request-list">
        <div class="request-card" th:each="req : ${list}">
            <div class="request-info">
                <div class="request-title" th:text="${req.title}"></div>
                <div class="request-desc" th:text="${req.description}"></div>
                <div class="request-date"
                     th:text="${#temporals.format(req.createdAt, 'dd MMM yyyy, HH:mm')}">
                </div>
            </div>
            <a class="btn-chat" th:href="@{/chat/{id}(id=${req.id})}">💬 Open Chat</a>
        </div>
    </div>

    <div class="nav-links">
        <a th:href="@{/provider/dashboard}">← Back to Dashboard</a>
        <a th:href="@{/provider/history}">Work History</a>
        <a th:href="@{/auth/logout}">Logout</a>
    </div>
</div>

</body>
</html>
