<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Setup Your Shop - NearFix</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; color: #333; }

        .container {
            max-width: 480px;
            margin: 70px auto;
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        h2 { color: #1a1a2e; margin-bottom: 0.4rem; }
        .subtitle { color: #6b7280; font-size: 0.9rem; margin-bottom: 1.5rem; }

        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1.2rem; }
        .form-group label { font-weight: 600; font-size: 0.9rem; }
        .form-group input,
        .form-group textarea {
            padding: 0.65rem 0.9rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
        }
        textarea { resize: vertical; }

        .error-msg {
            background: #fee2e2;
            color: #b91c1c;
            padding: 0.65rem 0.9rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .btn-primary {
            width: 100%;
            padding: 0.75rem;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
        }
        .btn-primary:hover { background: #4338ca; }
    </style>
</head>
<body>

<div class="container">
    <h2>Setup Your Shop</h2>
    <p class="subtitle">Before you can start bidding, tell us about your repair shop.</p>

    <div th:if="${error}" class="error-msg" th:text="${error}"></div>

    <form th:action="@{/provider/setup-shop}" method="post">

        <div class="form-group">
            <label>Shop Name</label>
            <input type="text" name="shopName" placeholder="e.g. Quick Fix Repairs"/>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="4"
                      placeholder="What kind of repairs do you specialize in?"></textarea>
        </div>

        <button type="submit" class="btn-primary"
                onclick="this.disabled=true; this.form.submit();">
            Save & Continue →
        </button>
    </form>
</div>

</body>
</html>
