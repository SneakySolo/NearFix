<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Work History - NearFix</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; color: #333; }

        .page-container { max-width: 800px; margin: 40px auto; padding: 0 1rem; }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .page-header h2 { color: #1a1a2e; }

        .request-list { display: flex; flex-direction: column; gap: 1rem; }

        .request-card {
            background: white;
            border-radius: 10px;
            padding: 1.2rem 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            border-left: 4px solid #059669;
        }

        .request-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.4rem;
        }

        .request-title { font-weight: 600; font-size: 1rem; color: #1a1a2e; }
        .done-badge {
            padding: 0.2rem 0.7rem;
            background: #dcfce7;
            color: #166534;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .request-desc { color: #555; font-size: 0.9rem; margin-bottom: 0.4rem; }
        .request-date { font-size: 0.78rem; color: #aaa; }

        .empty-state {
            text-align: center;
            color: #bbb;
            padding: 4rem 0;
            font-size: 0.95rem;
        }

        .nav-links {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
        }
        .nav-links a { color: #4f46e5; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="page-container">

    <div class="page-header">
        <h2>Work History</h2>
    </div>

    <div th:if="${#lists.isEmpty(requests)}" class="empty-state">
        You have no completed jobs yet.
    </div>

    <div class="request-list">
        <div class="request-card" th:each="req : ${requests}">
            <div class="request-card-header">
                <span class="request-title" th:text="${req.title}"></span>
                <span class="done-badge">✅ Completed</span>
            </div>
            <div class="request-desc" th:text="${req.description}"></div>
            <div class="request-date"
                 th:text="'Completed on ' + ${#temporals.format(req.createdAt, 'dd MMM yyyy')}">
            </div>
        </div>
    </div>

    <div class="nav-links">
        <a th:href="@{/provider/dashboard}">← Back to Dashboard</a>
        <a th:href="@{/auth/logout}">Logout</a>
    </div>

</div>

</body>
</html>
