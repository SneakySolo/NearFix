<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - NearFix</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; color: #333; }

        .page-container { max-width: 800px; margin: 40px auto; padding: 0 1rem; }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .dashboard-header h2 { color: #1a1a2e; }

        .btn-primary {
            padding: 0.6rem 1.2rem;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-primary:hover { background: #4338ca; }

        .section-title {
            font-size: 1rem;
            font-weight: 700;
            color: #374151;
            margin-bottom: 0.75rem;
            padding-bottom: 0.4rem;
            border-bottom: 2px solid #e5e7eb;
        }

        .section { margin-bottom: 2.5rem; }

        .request-list { display: flex; flex-direction: column; gap: 1rem; }

        .request-card {
            background: white;
            border-radius: 10px;
            padding: 1.2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            cursor: pointer;
            transition: box-shadow 0.15s;
        }
        .request-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.11); }

        /* history cards look muted */
        .request-card.history {
            background: #fafafa;
            box-shadow: none;
            border: 1px solid #e5e7eb;
        }

        .request-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .request-title { font-weight: 600; font-size: 1rem; color: #1a1a2e; }
        .request-title a { text-decoration: none; color: inherit; }
        .request-desc { color: #555; font-size: 0.9rem; margin-bottom: 0.4rem; }
        .request-date { font-size: 0.78rem; color: #aaa; }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .status-PENDING   { background: #fef9c3; color: #854d0e; }
        .status-ACCEPTED  { background: #dbeafe; color: #1e40af; }
        .status-DONE      { background: #dcfce7; color: #166534; }
        .status-DESTROYED { background: #fee2e2; color: #991b1b; }

        .empty-state {
            text-align: center;
            color: #bbb;
            padding: 2rem 0;
            font-size: 0.9rem;
        }

        .nav-links { margin-top: 2rem; text-align: right; }
        .nav-links a { color: #4f46e5; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="page-container">

    <div class="dashboard-header">
        <h2>My Repair Requests</h2>
        <a th:href="@{/customer/request/new}" class="btn-primary">+ New Request</a>
    </div>

    <!-- Active Requests -->
    <div class="section">
        <div class="section-title">Active Requests</div>

        <div th:if="${#lists.isEmpty(activeRequests)}" class="empty-state">
            No active requests. Create one above!
        </div>

        <div class="request-list">
            <div class="request-card" th:each="req : ${activeRequests}">
                <div class="request-card-header">
                    <span class="request-title">
                        <a th:href="@{/customer/request/{id}(id=${req.id})}"
                           th:text="${req.title}">
                        </a>
                    </span>
                    <span class="status-badge"
                          th:classappend="'status-' + ${req.status}"
                          th:text="${req.status}">
                    </span>
                </div>
                <div class="request-desc" th:text="${req.description}"></div>
                <div class="request-date"
                     th:text="${#temporals.format(req.createdAt, 'dd MMM yyyy, HH:mm')}">
                </div>
            </div>
        </div>
    </div>

    <!-- Order History -->
    <div class="section">
        <div class="section-title">Order History</div>

        <div th:if="${#lists.isEmpty(historyRequests)}" class="empty-state">
            No completed or expired requests yet.
        </div>

        <div class="request-list">
            <div class="request-card history" th:each="req : ${historyRequests}">
                <div class="request-card-header">
                    <span class="request-title">
                        <a th:href="@{/customer/request/{id}(id=${req.id})}"
                           th:text="${req.title}">
                        </a>
                    </span>
                    <span class="status-badge"
                          th:classappend="'status-' + ${req.status}"
                          th:text="${req.status}">
                    </span>
                </div>
                <div class="request-desc" th:text="${req.description}"></div>
                <div class="request-date"
                     th:text="${#temporals.format(req.createdAt, 'dd MMM yyyy, HH:mm')}">
                </div>
            </div>
        </div>
    </div>

    <div class="nav-links">
        <a th:href="@{/auth/logout}">Logout</a>
    </div>

</div>

<!-- Location capture -->
<script>
    navigator.geolocation.getCurrentPosition(function(pos) {
        fetch('/location/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'latitude=' + pos.coords.latitude + '&longitude=' + pos.coords.longitude
        });
    });
</script>

</body>
</html>
