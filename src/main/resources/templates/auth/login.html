<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:380px;
            background:white;
            padding:30px;
            border-radius:8px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:6px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:4px;
        }

        button{
            width:100%;
            padding:10px;
            background:#2563eb;
            border:none;
            color:white;
            border-radius:4px;
            cursor:pointer;
        }

        button:hover{
            background:#1e4ed8;
        }

        .error{
            color:red;
            text-align:center;
            margin-bottom:10px;
        }

        .link{
            text-align:center;
            margin-top:15px;
        }

        a{
            text-decoration:none;
        }

    </style>
</head>

<body>

<div class="card">

    <h2>Login</h2>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/auth/login}" th:object="${loginDTO}" method="post">

        <label>Email</label>
        <input type="email" th:field="*{email}" placeholder="Enter email">

        <label>Password</label>
        <input type="password" th:field="*{password}" placeholder="Enter password">

        <button type="submit", th:href="@{/customer/dashboard}">Login</button>

    </form>

    <div class="link">
        <p>Don't have an account? <a th:href="@{/auth/register}">Register</a></p>
    </div>

</div>

</body>
</html>
